{% extends "base.html" %}
{% block content %}
<h1>Test Jobs</h1>

<div id="form-panel"></div>

<div class="tbl-wrap">
  <div class="tbl-header">
    <h2>Recent Jobs <span class="tbl-count">{{ jobs|length }}</span></h2>
    <a href="/ui/jobs/new" class="btn btn-primary">+ New Job</a>
  </div>
  <table>
    <thead><tr>
      <th>Job ID</th><th>State</th><th>Device</th><th>Repo</th><th>Ref</th>
      <th>Created</th><th>Duration</th><th></th>
    </tr></thead>
    <tbody id="jobs-body"
           hx-get="/ui/jobs/list"
           hx-trigger="every 5s"
           hx-swap="innerHTML">
      {% include "jobs_body.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
