# run/topology.yaml — Tachyon HIL controller bench topology
# Corrected from protomq PR #1 (tyeth/protomq@5964cf1) board data.
# Devices represent the MCU DUTs running WipperSnapper firmware.
# Peripherals section catalogs attached display hardware.

hosts:
  - id: rpi-displays
    role: microcontroller-fleet
    addr: 192.168.1.234
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-displays
    capabilities: [power-control, mcp23017, usbip-server, cameras]

  - id: rpi-hil001
    role: sbc-fleet
    addr: rpi-hil001
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-hil-fleet
    max_concurrent_jobs: 1
    capabilities: []

  - id: rpi-hil002
    role: sbc-fleet
    addr: rpi-hil002
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-hil-fleet
    max_concurrent_jobs: 1
    capabilities: []

  - id: rpi-hil003
    role: sbc-fleet
    addr: rpi-hil003
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-hil-fleet
    max_concurrent_jobs: 1
    capabilities: []

  - id: rpi-hil004
    role: sbc-fleet
    addr: rpi-hil004
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-hil-fleet
    max_concurrent_jobs: 1
    capabilities: []

  - id: rpi-hil005
    role: sbc-fleet
    addr: rpi-hil005
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-hil-fleet
    max_concurrent_jobs: 1
    capabilities: []

  - id: rpi-hil006
    role: sbc-fleet
    addr: rpi-hil006
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-hil-fleet
    max_concurrent_jobs: 1
    capabilities: []

cameras:
  - id: android-note9
    source: http://192.168.1.249:8080/shot.jpg
    model: IP Webcam Android
    pool: public
    status: available
    notes: Android Note 9 running IP Webcam app; covers WipperSnapper Python SBC fleet (rpi-hil001–006)

  - id: csi-rpi-displays
    host_id: rpi-displays
    source: http://192.168.1.234:8080/
    model: CSI Camera (rpi-displays)
    pool: public
    status: available
    notes: Raspberry Pi CSI camera on rpi-displays; served by tools/camera-server/snapshot_server.py on :8080

peripherals:
  # Display hardware tested on the display bench.
  # Each peripheral is attached to (or integrated into) an MCU DUT.

  - id: periph-rgb-lcd-16x2
    kind: display
    model: "RGB Backlight Positive LCD 16x2"
    product_url: "https://adafru.it/398"
    notes: "16x2 character LCD with positive RGB backlight; I2C/parallel interface"

  - id: periph-eink-29-rbw
    kind: display
    model: "2.9in Red/Black/White eInk Breakout"
    product_url: "https://adafru.it/1028"
    notes: "Tri-color 2.9in eInk display breakout board; SPI interface"

  - id: periph-oled-fw-128x32
    kind: display
    model: "OLED FeatherWing 128x32"
    product_url: "https://adafru.it/2900"
    notes: "128x32 monochrome OLED FeatherWing; I2C interface; SSD1306 driver"

  - id: periph-alpha-fw-quad-green
    kind: display
    model: "0.54in Quad Alphanumeric FeatherWing (Green)"
    product_url: "https://adafru.it/3129"
    notes: "Quad 14-segment alphanumeric display FeatherWing; I2C/HT16K33 driver"

  - id: periph-pyportal-tft
    kind: display
    model: "PyPortal Integrated TFT (320x240)"
    product_url: "https://adafru.it/4116"
    notes: "3.2in 320x240 TFT display integrated into PyPortal board; ILI9341 driver"

  - id: periph-tft-13-240x240
    kind: display
    model: "1.3in 240x240 TFT LCD Breakout"
    product_url: "https://adafru.it/4313"
    notes: "1.3in 240x240 color TFT LCD breakout; SPI/ST7789 driver"

  - id: periph-oled-091-stemma
    kind: display
    model: "0.91in 128x32 Monochrome OLED (STEMMA QT)"
    product_url: "https://adafru.it/4440"
    notes: "0.91in 128x32 monochrome OLED breakout with STEMMA QT; I2C/SSD1306 driver"

  - id: periph-oled-fw-128x64
    kind: display
    model: "OLED FeatherWing 128x64 (STEMMA QT)"
    product_url: "https://adafru.it/4650"
    notes: "128x64 monochrome OLED FeatherWing with STEMMA QT; I2C/SSD1306 driver"

  - id: periph-eink-29-gray-fw
    kind: display
    model: "2.9in Grayscale eInk FeatherWing"
    product_url: "https://adafru.it/4777"
    notes: "2.9in grayscale eInk display FeatherWing; SPI interface"

  - id: periph-eink-154-tricolor
    kind: display
    model: "1.54in Tri-Color eInk 200x200"
    product_url: "https://adafru.it/4868"
    notes: "1.54in tri-color (red/black/white) eInk display breakout; SPI interface"

  - id: periph-feather-esp32s2-tft-display
    kind: display
    model: "Feather ESP32-S2 TFT Integrated Display (240x135)"
    product_url: "https://adafru.it/5300"
    notes: "1.14in 240x135 color TFT integrated into Feather ESP32-S2 TFT board; SPI/ST7789 driver"

  - id: periph-feather-esp32s3-tft-display
    kind: display
    model: "Feather ESP32-S3 TFT Integrated Display (240x135)"
    product_url: "https://adafru.it/5483"
    notes: "1.14in 240x135 color TFT integrated into Feather ESP32-S3 TFT board; SPI/ST7789 driver"

  - id: periph-feather-esp32s3-revtft-display
    kind: display
    model: "Feather ESP32-S3 Reverse TFT Integrated Display (240x135)"
    product_url: "https://adafru.it/5691"
    notes: "1.14in 240x135 color TFT (reverse-mounted) integrated into Feather ESP32-S3 Reverse TFT board; SPI/ST7789 driver"

