# /etc/hil/topology.yaml — copy and adjust for your bench.
# The controller reads this at startup (HIL_TOPOLOGY_FILE env var).

hosts:
  - id: rpi-displays
    role: microcontroller-fleet
    addr: 192.168.1.234
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-displays
    max_concurrent_jobs: null      # unbounded; per-device locks are the real constraint
    capabilities: [power-control, mcp23017, usbip-server, cameras]

  - id: rpi-hil001
    role: sbc-fleet
    addr: rpi-hil001.local
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-hil-fleet
    max_concurrent_jobs: 1
    capabilities: []

  - id: rpi-hil003
    role: sbc-fleet
    addr: rpi-hil003.local
    transport: ssh
    ssh_user: pi
    ssh_key_path: /etc/hil/keys/rpi-hil-fleet
    max_concurrent_jobs: 1
    capabilities: []

  - id: localhost
    kind: local
    role: sbc-fleet
    max_concurrent_jobs: 2
    capabilities: [linux, python-snapper]

  # The controller host itself (Tachyon). `kind: local` ⇒ commands run via
  # LocalTransport — no SSH. Used as the *build host* for arduino-ws jobs
  # (rpi-displays is too weak to compile WipperSnapper) and, with flash_mode
  # usbip, as the host that attaches the DUT's USB port and flashes it.
  # `addr` is the LAN IP the DUT reaches the controller's protomq/usbipd at.
  - id: tachyon
    kind: local
    role: controller
    addr: 192.168.1.169
    max_concurrent_jobs: 2
    capabilities: [linux, platformio, node, usbip-client, vhci]

  - id: pi5-protomq
    role: protomq-broker
    addr: 192.168.1.210
    transport: none
    mqtt_port: 1884

devices:
  - id: rpi-hil001-pi5-a
    host_id: rpi-hil001
    kind: sbc
    model: pi5
    capabilities: [linux, python-snapper]
    pool: wippersnapper-python
    status: available

  - id: rpi-hil003-pi5-a
    host_id: rpi-hil003
    kind: sbc
    model: pi5
    capabilities: [linux, python-snapper]
    pool: wippersnapper-python
    status: available

  - id: localhost-runner-a
    host_id: localhost
    kind: sbc
    model: local
    capabilities: [linux, python-snapper]
    pool: wippersnapper-python
    status: available

  - id: qtpy-s3-01
    host_id: rpi-displays
    kind: microcontroller
    model: esp32-s3
    capabilities: [native-cdc, spi, i2c]
    usb: { vid: "239a", pid: "8143" }
    pool: public
    status: available

  # Per-phase execution-location wiring (model A / usbip): the *execution* host
  # is the controller (so builds compile on Tachyon), while the device's USB
  # physically lives on rpi-displays at busid 1-1.1.1.4. flash_mode=usbip binds
  # that busid on rpi-displays and attaches it onto Tachyon to flash.
  - id: mcu-feather-esp32s3-revtft
    host_id: tachyon            # execution/build host (controller)
    hub_host_id: rpi-displays   # USB-server host that physically holds the DUT
    hub_port_path: "1-1.1.1.4"  # usbip busid on rpi-displays
    kind: microcontroller
    model: Feather ESP32-S3 Reverse TFT
    capabilities: [arduino, wippersnapper, tft-display]
    pool: public
    status: available
